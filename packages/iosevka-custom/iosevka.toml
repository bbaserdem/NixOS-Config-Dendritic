[buildPlans.IosevkaCustom]
family = "Iosevka Custom"
spacing = "normal"
serifs = "sans"
noCvSs = true
exportGlyphNames = false

[buildPlans.IosevkaCustom.variants.design]
one = "no-base-long-top-serif"
three = "flat-top-serifless"
four = "closed-serifless"
seven = "straight-serifless-crossbar"
nine = "open-contour"
zero = "diamond-slashed"
capital-b = "more-asymmetric-serifless"
capital-g = "toothless-corner-serifless-hooked"
capital-q = "crossing"
capital-r = "standing-open-serifless"
capital-y = "curly-serifless"
capital-z = "straight-serifless-with-horizontal-crossbar"
a = "double-storey-toothless-corner"
b = "toothless-corner-serifless"
d = "toothless-corner-serifless"
g = "single-storey-earless-corner"
j = "serifless"
p = "earless-corner-serifless"
q = "earless-corner-straight-serifless"
diacritic-dot = "round"
asterisk = "hex-high"
at = "fourfold"
lig-ltgteq = "slanted"

  [buildPlans.IosevkaCustom.ligations]
  inherits = "dlig"

[buildPlans.IosevkaCustom.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.IosevkaCustom.weights.Light]
shape = 300
menu = 300
css = 300

[buildPlans.IosevkaCustom.weights.ExtraBold]
shape = 800
menu = 800
css = 800

[buildPlans.IosevkaCustom.weights.Heavy]
shape = 900
menu = 900
css = 900

[buildPlans.IosevkaCustom.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.IosevkaCustom.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
